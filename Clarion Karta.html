<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Clarion Hotel Stockholm</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --moss:    #3a5a40;
    --sage:    #6a9470;
    --bark:    #7c5c3e;
    --cream:   #f5f0e8;
    --parchment: #e8dfc8;
    --ink:     #2a2a22;
    --mist:    #c8d8c0;
    --gold:    #b08840;
    --stagegrey: #404040;
    --zoom: 1;

    --cat-r: #4f7a48;
    --cat-f: #c9a227;
    --cat-t: #8a8f87;
    --cat-k: #7c5c3e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--cream);
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--moss);
    color: var(--cream);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    z-index: 1000;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    flex-shrink: 0;
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .header-title span { font-style: italic; color: var(--mist); }

  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .lang-toggle { display: flex; border: 1.5px solid var(--mist); border-radius: 6px; overflow: hidden; }
  .lang-toggle button {
    background: transparent; border: none; color: var(--mist);
    padding: 5px 11px; font-family: 'Lato', sans-serif; font-size: 0.78rem;
    font-weight: 700; letter-spacing: 0.06em; cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .lang-toggle button + button { border-left: 1.5px solid var(--mist); }
  .lang-toggle button.active { background: var(--sage); color: white; }
  .lang-toggle button:hover:not(.active) { background: rgba(255,255,255,0.1); }

  .layer-panel { display: flex; gap: 8px; flex-wrap: wrap; }
  .layer-pill {
    display: flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px; padding: 3px 10px 3px 7px; cursor: pointer;
    font-size: 0.74rem; font-weight: 700; letter-spacing: 0.04em;
    color: var(--mist); transition: background 0.15s, color 0.15s;
    user-select: none; white-space: nowrap;
  }
  .layer-pill input { display: none; }
  .layer-pill .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(255,255,255,0.5); }
  .layer-pill.checked { background: rgba(255,255,255,0.22); color: white; }
  .layer-pill.checked .dot { border-color: white; }

  .pill-list-btn {
    background: none; border: none; color: var(--mist);
    font-size: 0.9rem; cursor: pointer; padding: 0 0 0 4px;
    line-height: 1; opacity: 0.7; transition: opacity 0.15s;
  }
  .pill-list-btn:hover { opacity: 1; color: white; }

  .search-wrap { position: relative; }
  #search {
    background: rgba(255,255,255,0.15); border: 1.5px solid var(--mist);
    border-radius: 6px; color: white; padding: 5px 10px;
    font-family: 'Lato', sans-serif; font-size: 0.78rem; width: 160px;
    outline: none; transition: background 0.15s;
  }
  #search::placeholder { color: rgba(200,216,192,0.7); }
  #search:focus { background: rgba(255,255,255,0.22); }

  #search-results {
    position: absolute; top: 100%; left: 0; right: 0;
    background: var(--cream); border: 1px solid var(--moss);
    border-radius: 0 0 6px 6px; max-height: 220px; overflow-y: auto;
    z-index: 9999; display: none;
  }
  .search-item { padding: 6px 10px; font-size: 0.78rem; cursor: pointer; color: var(--ink); border-bottom: 1px solid var(--parchment); }
  .search-item:hover { background: var(--mist); }
  .search-item .si-code { font-weight: 700; color: var(--sage); margin-right: 6px; }
  .search-show-all {
    padding: 7px 10px; font-size: 0.78rem; font-weight: 700; cursor: pointer;
    color: var(--moss); background: var(--parchment); border-bottom: 2px solid var(--moss); letter-spacing: 0.03em;
  }
  .search-show-all:hover { background: var(--mist); }

  #content-wrap { flex: 1; display: flex; overflow: hidden; }

  #list-panel {
    width: 0; min-width: 0; overflow: hidden; background: var(--cream);
    border-right: 2px solid var(--parchment); display: flex; flex-direction: column;
    transition: width 0.3s ease, min-width 0.3s ease; z-index: 500;
  }
  #list-panel.open { width: 46%; min-width: 340px; }
  #list-panel-header {
    background: var(--moss); color: var(--cream); padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  #list-panel-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-style: italic; }
  #list-panel-close {
    background: none; border: none; color: var(--mist); font-size: 1.2rem;
    cursor: pointer; padding: 2px 6px; line-height: 1; border-radius: 4px;
  }
  #list-panel-close:hover { background: rgba(255,255,255,0.15); color: white; }
  #list-panel-body { overflow-y: auto; flex: 1; padding: 0; }

  #list-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  #list-table thead th {
    background: var(--parchment); color: var(--sage); font-size: 0.65rem;
    font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 8px 10px; text-align: left; position: sticky; top: 0; border-bottom: 2px solid var(--mist);
  }
  #list-table tbody tr { border-bottom: 1px solid var(--parchment); cursor: pointer; transition: background 0.1s; }
  #list-table tbody tr:hover { background: var(--mist); }
  #list-table tbody td { padding: 7px 10px; vertical-align: middle; color: var(--ink); }
  #list-table tbody td.marker { font-size: 0.72rem; color: var(--sage); font-weight: 700; white-space: nowrap; }
  #list-table tbody td.empty { color: #aaa; font-style: italic; }

  /* ── MAP VIEWPORT ─────────────────────────────────────────────────────── */
  #map-viewport {
    flex: 1; min-width: 0; position: relative; overflow: hidden;
    background: var(--stagegrey);
    cursor: grab;
    touch-action: none;
  }
  #map-viewport.grabbing { cursor: grabbing; }
  #map-stage {
    position: absolute; top: 0; left: 0;
    transform-origin: 0 0;
    will-change: transform;
  }
  #floor-img { display: block; user-select: none; -webkit-user-drag: none; pointer-events: none; }

  .pin {
    position: absolute;
    transform: translate(-50%, -100%);
    cursor: pointer;
  }
  .pin-dot {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
  }
  .pin-dot svg { width: 100%; height: 100%; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }
  .pin.hidden-cat { display: none; }

  .pin-tip {
    position: absolute; bottom: 100%; left: 50%;
    transform: translate(-50%, -4px) scale(calc(1 / var(--zoom)));
    transform-origin: bottom center;
    background: var(--ink); color: white; font-size: 11px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; white-space: nowrap;
    pointer-events: none; opacity: 0; transition: opacity 0.1s;
  }
  .pin:hover .pin-tip { opacity: 0.92; }

  .popup-card {
    position: absolute; bottom: calc(100% + 10px); left: 50%;
    transform: translate(-50%, 0) scale(calc(1 / var(--zoom)));
    transform-origin: bottom center;
    background: var(--cream); border: 2px solid var(--moss); border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3); padding: 10px 14px;
    min-width: 170px; max-width: 240px; display: none; z-index: 10;
  }
  .popup-card::after {
    content:''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 7px solid transparent; border-top-color: var(--moss);
  }
  .popup-card.open { display: block; }
  .popup-cat-tag {
    font-size: 0.63rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 4px;
  }
  .popup-code { font-size: 0.7rem; font-weight: 700; color: var(--sage); margin-bottom: 3px; }
  .popup-name { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--ink); line-height: 1.3; margin-bottom: 5px; }
  .popup-sub { font-size: 0.78rem; color: #666; border-top: 1px solid var(--parchment); padding-top: 5px; }
  .popup-sub .lbl { font-size: 0.63rem; font-weight: 700; color: var(--sage); display: block; letter-spacing: 0.05em; }
  .popup-empty { color: #999; font-style: italic; }

  /* ── ZOOM CONTROLS ────────────────────────────────────────────────────── */
  #zoom-controls {
    position: absolute; right: 14px; bottom: 14px; z-index: 600;
    display: flex; flex-direction: column; gap: 6px;
  }
  #zoom-controls button {
    width: 34px; height: 34px; border-radius: 8px; border: none;
    background: rgba(58,90,64,0.9); color: white; font-size: 1.1rem; font-weight: 700;
    cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  #zoom-controls button:hover { background: var(--sage); }
  #zoom-controls button#zoom-reset { font-size: 0.85rem; }

  #legend-box {
    position: absolute; left: 14px; bottom: 14px; z-index: 600;
    background: rgba(245,240,232,0.94); border: 1.5px solid var(--parchment);
    border-radius: 8px; padding: 8px 12px; font-size: 0.72rem;
    display: flex; flex-direction: column; gap: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  #legend-box .leg-row { display: flex; align-items: center; gap: 6px; }
  #legend-box .leg-swatch { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  @media (max-width: 640px) {
    header { padding: 8px 12px; }
    .header-title { font-size: 1rem; }
    #search { width: 108px; }
    #list-panel.open { width: 80%; min-width: 0; }
    #legend-box { font-size: 0.62rem; padding: 6px 9px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">Clarion <span>Trädgård</span></div>
  <div class="controls">
    <div class="lang-toggle">
      <button class="active" onclick="setLang('sv')" id="btn-sv">SV</button>
      <button onclick="setLang('en')" id="btn-en">EN</button>
    </div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Sök odlingskärl…" autocomplete="off" oninput="doSearch(this.value)">
      <div id="search-results"></div>
    </div>
  </div>
  <div class="layer-panel" id="layer-panel"></div>
</header>

<div id="content-wrap">
  <div id="list-panel">
    <div id="list-panel-header">
      <span id="list-panel-title">—</span>
      <button id="list-panel-close" onclick="closeListPanel()">✕</button>
    </div>
    <div id="list-panel-body">
      <table id="list-table">
        <thead>
          <tr>
            <th id="col-marker">Markör</th>
            <th id="col-sv">Svenska</th>
            <th id="col-en">English</th>
          </tr>
        </thead>
        <tbody id="list-tbody"></tbody>
      </table>
    </div>
  </div>

// ─── PIN POSITIONS (percent of image, derived from the floor plan) ──────────
const POSITIONS = {
  R1:{x:33.80,y:6.63}, R2:{x:73.36,y:6.29}, R3:{x:46.71,y:12.73}, R4:{x:57.52,y:13.16},
  R5:{x:46.53,y:20.26}, R6:{x:57.53,y:17.63}, R7:{x:46.53,y:26.01}, R8:{x:57.52,y:21.98},
  R9:{x:46.71,y:32.63}, R10:{x:57.53,y:26.33}, R11:{x:46.71,y:36.98}, R12:{x:57.53,y:32.90},
  R13:{x:47.24,y:47.73}, R14:{x:57.52,y:37.25}, R15:{x:57.53,y:44.08}, R16:{x:57.53,y:44.08},
  R17:{x:47.24,y:56.44}, R18:{x:57.52,y:48.43}, R19:{x:82.31,y:52.83}, R20:{x:57.53,y:52.79},
  R21:{x:57.70,y:62.84}, R22:{x:74.54,y:74.35}, R23:{x:74.55,y:78.70},

  F1:{x:47.07,y:6.55}, F2:{x:59.84,y:6.56}, F3:{x:46.50,y:16.51}, F4:{x:57.50,y:29.63},
  F5:{x:47.04,y:40.81}, F6:{x:57.50,y:56.84}, F7:{x:46.86,y:63.07}, F8:{x:79.66,y:59.09},

  T1:{x:21.10,y:11.18}, T2:{x:84.04,y:9.78}, T3:{x:21.10,y:23.44}, T4:{x:83.87,y:22.26},
  T5:{x:20.74,y:35.81}, T6:{x:84.57,y:35.16}, T7:{x:20.57,y:47.85}, T8:{x:86.88,y:47.20},
  T9:{x:21.10,y:58.60},

  K1:{x:80.99,y:6.01}, K2:{x:79.39,y:15.58}, K3:{x:79.21,y:18.70}, K4:{x:63.79,y:20.09},
  K5:{x:57.40,y:40.63}, K6:{x:47.12,y:44.29}, K7:{x:46.77,y:60.63}, K8:{x:57.58,y:59.45},
  K9:{x:74.96,y:65.79}, K10:{x:75.13,y:67.62}, K11:{x:75.31,y:69.99},
};
// Manual correction: R15 is the empty bed just above R16 in the same column
POSITIONS.R15 = { x: 57.53, y: 40.81 };

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentLang = 'sv';
const catVisible = { R: true, F: true, T: true, K: true };
let openPopupCode = null;

const IMG_W = 564, IMG_H = 930;

function catOf(code) { return code[0]; }

// ─── PIN ICON (teardrop) ─────────────────────────────────────────────────────
function pinSVG(hex) {
  return `<svg viewBox="0 0 24 34" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 0C5.37 0 0 5.37 0 12c0 9 12 22 12 22S24 21 24 12C24 5.37 18.63 0 12 0z" fill="${hex}" stroke="white" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="4" fill="white" fill-opacity="0.85"/>
  </svg>`;
}

// ─── BUILD PINS ───────────────────────────────────────────────────────────────
const pinsLayer = document.getElementById('pins-layer');
const pinEls = {}; // code -> { el, popup }

Object.keys(POSITIONS).forEach(code => {
  const cat = CATEGORIES.find(c => c.id === catOf(code));
  const pos = POSITIONS[code];

  const pin = document.createElement('div');
  pin.className = 'pin';
  pin.style.left = pos.x + '%';
  pin.style.top = pos.y + '%';
  pin.dataset.code = code;
  pin.dataset.cat = cat.id;

  const dot = document.createElement('div');
  dot.className = 'pin-dot';
  dot.innerHTML = pinSVG(cat.hex);
  pin.appendChild(dot);

  const tip = document.createElement('div');
  tip.className = 'pin-tip';
  tip.textContent = code;
  pin.appendChild(tip);

  const popup = document.createElement('div');
  popup.className = 'popup-card';
  pin.appendChild(popup);

  pin.addEventListener('click', (e) => {
    e.stopPropagation();
    togglePopup(code);
  });

  pinsLayer.appendChild(pin);
  pinEls[code] = { pinEl: pin, popupEl: popup, cat: cat.id };
});

function buildPopupHTML(code) {
  const cat = CATEGORIES.find(c => c.id === catOf(code));
  const plant = PLANTS[code] || { sv: null, en: null };
  const otherLang = currentLang === 'sv' ? 'en' : 'sv';
  const mainName = plant[currentLang];
  const otherName = plant[otherLang];
  const otherLabel = otherLang === 'sv' ? 'Svenska' : 'English';

  const nameHTML = mainName
    ? `<div class="popup-name">${mainName}</div>`
    : `<div class="popup-name popup-empty">${currentLang === 'sv' ? '(Tom)' : '(Empty)'}</div>`;

  const subHTML = otherName
    ? `<div class="popup-sub"><span class="lbl">${otherLabel}</span>${otherName}</div>`
    : '';

  return `
    <div class="popup-cat-tag" style="color:${cat.hex}">${cat.label[currentLang]}</div>
    <div class="popup-code">${code}</div>
    ${nameHTML}
    ${subHTML}
  `;
}

function togglePopup(code) {
  if (openPopupCode === code) {
    closeAllPopups();
    return;
  }
  closeAllPopups();
  const { popupEl } = pinEls[code];
  popupEl.innerHTML = buildPopupHTML(code);
  popupEl.classList.add('open');
  openPopupCode = code;
}

function closeAllPopups() {
  Object.values(pinEls).forEach(({ popupEl }) => popupEl.classList.remove('open'));
  openPopupCode = null;
}

document.getElementById('map-viewport').addEventListener('click', () => closeAllPopups());

// ─── LANGUAGE ─────────────────────────────────────────────────────────────────
const SEARCH_PLACEHOLDER = { sv: 'Sök odlingskärl…', en: 'Search planters…' };

function setLang(lang) {
  currentLang = lang;
  ['sv','en'].forEach(l => document.getElementById('btn-'+l).classList.toggle('active', l === lang));
  document.getElementById('search').placeholder = SEARCH_PLACEHOLDER[lang];

  document.querySelectorAll('.layer-pill').forEach(pill => {
    const cat = CATEGORIES.find(c => c.id === pill.dataset.catId);
    pill.querySelector('.pill-label').textContent = cat.label[lang];
  });

  if (openPopupCode) {
    const { popupEl } = pinEls[openPopupCode];
    popupEl.innerHTML = buildPopupHTML(openPopupCode);
  }

  buildLegend();
  updateListHeaders();
  if (currentListCat) openListPanel(currentListCat);
}

// ─── LAYER TOGGLE PILLS ───────────────────────────────────────────────────────
const layerPanel = document.getElementById('layer-panel');
CATEGORIES.forEach(cat => {
  const pill = document.createElement('label');
  pill.className = 'layer-pill checked';
  pill.dataset.catId = cat.id;
  pill.innerHTML = `<input type="checkbox" checked>
    <span class="dot" style="background:${cat.hex}"></span><span class="pill-label">${cat.label.sv}</span>`;
  pill.title = cat.label.sv;

  pill.querySelector('input').addEventListener('change', e => {
    catVisible[cat.id] = e.target.checked;
    pill.classList.toggle('checked', e.target.checked);
    document.querySelectorAll(`.pin[data-cat="${cat.id}"]`).forEach(p => {
      p.classList.toggle('hidden-cat', !e.target.checked);
    });
  });

  const listBtn = document.createElement('button');
  listBtn.className = 'pill-list-btn';
  listBtn.textContent = '⊞';
  listBtn.title = 'Visa lista';
  listBtn.addEventListener('click', e => {
    e.preventDefault(); e.stopPropagation();
    openListPanel(cat.id);
  });
  pill.appendChild(listBtn);
  layerPanel.appendChild(pill);
});

// ─── LEGEND ───────────────────────────────────────────────────────────────────
function buildLegend() {
  const box = document.getElementById('legend-box');
  box.innerHTML = CATEGORIES.map(cat =>
    `<div class="leg-row"><span class="leg-swatch" style="background:${cat.hex}"></span>${cat.label[currentLang]}</div>`
  ).join('');
}

// ─── LIST PANEL ───────────────────────────────────────────────────────────────
let currentListCat = null;

function updateListHeaders() {
  document.getElementById('col-marker').textContent = currentLang === 'sv' ? 'Markör' : 'Marker';
  document.getElementById('col-sv').textContent = 'Svenska';
  document.getElementById('col-en').textContent = 'English';
  if (currentListCat) {
    const cat = CATEGORIES.find(c => c.id === currentListCat);
    document.getElementById('list-panel-title').textContent = cat.label[currentLang];
  }
}

function openListPanel(catId) {
  currentListCat = catId;
  const cat = CATEGORIES.find(c => c.id === catId);
  document.getElementById('list-panel-title').textContent = cat.label[currentLang];

  const codes = Object.keys(POSITIONS).filter(c => catOf(c) === catId)
    .sort((a,b) => parseInt(a.slice(1)) - parseInt(b.slice(1)));

  const tbody = document.getElementById('list-tbody');
  tbody.innerHTML = '';
  codes.forEach(code => {
    const plant = PLANTS[code] || { sv:null, en:null };
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="marker">${code}</td>
      <td class="${plant.sv ? '' : 'empty'}">${plant.sv || (currentLang==='sv' ? '(Tom)' : '(empty)')}</td>
      <td class="${plant.en ? '' : 'empty'}">${plant.en || (currentLang==='sv' ? '(Tom)' : '(empty)')}</td>`;
    tr.addEventListener('click', () => { zoomToCode(code); togglePopup(code); });
    tbody.appendChild(tr);
  });

  updateListHeaders();
  document.getElementById('list-panel').classList.add('open');
}

function closeListPanel() {
  document.getElementById('list-panel').classList.remove('open');
  currentListCat = null;
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function matchesQuery(code, q) {
  const plant = PLANTS[code] || {};
  return code.toLowerCase().includes(q) ||
    (plant.sv || '').toLowerCase().includes(q) ||
    (plant.en || '').toLowerCase().includes(q);
}

function doSearch(query) {
  const box = document.getElementById('search-results');
  if (!query || query.length < 1) { box.style.display = 'none'; return; }
  const q = query.toLowerCase();
  const hits = Object.keys(POSITIONS).filter(code => matchesQuery(code, q)).slice(0, 30);

  if (!hits.length) { box.innerHTML = `<div class="search-item">${currentLang==='sv'?'Inga träffar':'No matches'}</div>`; box.style.display = 'block'; return; }

  const showAllBtn = hits.length > 1
    ? `<div class="search-show-all" id="show-all-btn">🔍 ${currentLang==='sv'?'Visa alla':'Show all'} (${hits.length})</div>` : '';

  box.innerHTML = showAllBtn + hits.map(code => {
    const plant = PLANTS[code] || {};
    const label = plant[currentLang] || plant[currentLang==='sv'?'en':'sv'] || (currentLang==='sv'?'(Tom)':'(empty)');
    return `<div class="search-item" data-code="${code}"><span class="si-code">${code}</span>${label}</div>`;
  }).join('');
  box.style.display = 'block';

  if (hits.length > 1) {
    document.getElementById('show-all-btn').addEventListener('click', () => {
      fitToCodes(hits);
      box.style.display = 'none';
    });
  }
  box.querySelectorAll('.search-item[data-code]').forEach(el => {
    el.addEventListener('click', () => {
      const code = el.dataset.code;
      zoomToCode(code);
      togglePopup(code);
      box.style.display = 'none';
      document.getElementById('search').value = '';
    });
  });
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) document.getElementById('search-results').style.display = 'none';
});

// ─── PAN / ZOOM ENGINE ────────────────────────────────────────────────────────
const viewport = document.getElementById('map-viewport');
const stage = document.getElementById('map-stage');

let scale = 1, tx = 0, ty = 0;
let minScale = 0.3, maxScale = 6;

function applyTransform() {
  stage.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  document.documentElement.style.setProperty('--zoom', scale);
}

function fitStage(padding = 20) {
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  const s = Math.min((vw - padding*2) / IMG_W, (vh - padding*2) / IMG_H);
  scale = Math.max(s, 0.05);
  minScale = scale * 0.6;
  maxScale = scale * 8;
  tx = (vw - IMG_W * scale) / 2;
  ty = (vh - IMG_H * scale) / 2;
  applyTransform();
}

function zoomAt(clientX, clientY, factor) {
  const rect = viewport.getBoundingClientRect();
  const px = clientX - rect.left, py = clientY - rect.top;
  const newScale = Math.min(maxScale, Math.max(minScale, scale * factor));
  const ratio = newScale / scale;
  tx = px - (px - tx) * ratio;
  ty = py - (py - ty) * ratio;
  scale = newScale;
  applyTransform();
}

function zoomToCode(code) {
  const pos = POSITIONS[code];
  if (!pos) return;
  const imgX = pos.x/100 * IMG_W, imgY = pos.y/100 * IMG_H;
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  scale = Math.min(maxScale, Math.max(scale, (minScale*3)));
  scale = Math.min(scale, 3.2);
  tx = vw/2 - imgX*scale;
  ty = vh/2 - imgY*scale - 30;
  applyTransform();
}

function fitToCodes(codes) {
  if (!codes.length) return;
  let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;
  codes.forEach(code => {
    const pos = POSITIONS[code]; if (!pos) return;
    const x = pos.x/100*IMG_W, y = pos.y/100*IMG_H;
    minX=Math.min(minX,x); maxX=Math.max(maxX,x);
    minY=Math.min(minY,y); maxY=Math.max(maxY,y);
  });
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  const padding = 80;
  const bw = Math.max(maxX-minX, 40), bh = Math.max(maxY-minY, 40);
  const s = Math.min((vw-padding*2)/bw, (vh-padding*2)/bh, maxScale);
  scale = Math.max(s, minScale);
  const cx = (minX+maxX)/2, cy = (minY+maxY)/2;
  tx = vw/2 - cx*scale;
  ty = vh/2 - cy*scale;
  applyTransform();
}

// Wheel zoom
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
  zoomAt(e.clientX, e.clientY, factor);
}, { passive: false });

// Drag pan (pointer events, unified mouse+touch)
let dragging = false, lastX = 0, lastY = 0;
const activePointers = new Map();
let pinchStartDist = null, pinchStartScale = null;

viewport.addEventListener('pointerdown', e => {
  // If the press started on a pin, let the pin's own click handler deal with it —
  // capturing the pointer here would retarget the resulting click to the viewport
  // instead of the pin, which is why popups weren't opening.
  if (e.target.closest('.pin')) return;

  viewport.setPointerCapture(e.pointerId);
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (activePointers.size === 1) {
    dragging = true;
    lastX = e.clientX; lastY = e.clientY;
    viewport.classList.add('grabbing');
  } else if (activePointers.size === 2) {
    dragging = false;
    const pts = [...activePointers.values()];
    pinchStartDist = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
    pinchStartScale = scale;
  }
});

viewport.addEventListener('pointermove', e => {
  if (!activePointers.has(e.pointerId)) return;
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (activePointers.size === 2) {
    const pts = [...activePointers.values()];
    const dist = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
    if (pinchStartDist) {
      const midX = (pts[0].x+pts[1].x)/2, midY = (pts[0].y+pts[1].y)/2;
      const targetScale = Math.min(maxScale, Math.max(minScale, pinchStartScale * (dist/pinchStartDist)));
      const ratio = targetScale/scale;
      const rect = viewport.getBoundingClientRect();
      const px = midX-rect.left, py = midY-rect.top;
      tx = px - (px-tx)*ratio; ty = py - (py-ty)*ratio;
      scale = targetScale;
      applyTransform();
    }
  } else if (dragging && activePointers.size === 1) {
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    tx += dx; ty += dy;
    lastX = e.clientX; lastY = e.clientY;
    applyTransform();
  }
});

function endPointer(e) {
  activePointers.delete(e.pointerId);
  if (activePointers.size < 2) pinchStartDist = null;
  if (activePointers.size === 0) { dragging = false; viewport.classList.remove('grabbing'); }
}
viewport.addEventListener('pointerup', endPointer);
viewport.addEventListener('pointercancel', endPointer);
viewport.addEventListener('pointerleave', endPointer);

document.getElementById('zoom-in').addEventListener('click', () => {
  const rect = viewport.getBoundingClientRect();
  zoomAt(rect.left+rect.width/2, rect.top+rect.height/2, 1.3);
});
document.getElementById('zoom-out').addEventListener('click', () => {
  const rect = viewport.getBoundingClientRect();
  zoomAt(rect.left+rect.width/2, rect.top+rect.height/2, 1/1.3);
});
document.getElementById('zoom-reset').addEventListener('click', () => fitStage());

window.addEventListener('resize', () => fitStage());

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildLegend();
setLang('sv');
requestAnimationFrame(() => fitStage());
</script>
</body>
</html>
